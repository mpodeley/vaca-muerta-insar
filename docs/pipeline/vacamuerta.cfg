# Config mínima de MintPy para la demo Fase 1 (stack HyP3 / InSAR GAMMA).
# Doc: https://mintpy.readthedocs.io  ·  basado en docs/Fase-1-guia.md §4.3
# Las rutas son relativas a fase1/ (corré 03_timeseries.sh desde ahí).

mintpy.load.processor      = hyp3
mintpy.load.unwFile        = ./products/*/*_unw_phase.tif
mintpy.load.corFile        = ./products/*/*_corr.tif
mintpy.load.demFile        = ./products/*/*_dem.tif
mintpy.load.incAngleFile   = ./products/*/*_lv_theta.tif
mintpy.load.azAngleFile    = ./products/*/*_lv_phi.tif

# Punto de referencia automático (zona de alta coherencia). Si querés anclarlo a
# un punto estable conocido, poné "lat, lon".
mintpy.reference.lalo      = auto

# Recorte al clúster de producción (= bbox de aoi.py: lat0:lat1, lon0:lon1).
# Enfoca la salida en la zona caliente y acelera la inversión.
mintpy.subset.lalo         = -38.65:-38.05, -69.10:-68.40

# Correcciones estándar. Tropo con ERA5 vía pyaps (requiere ~/.cdsapirc, ya configurado).
mintpy.troposphericDelay.method = pyaps
mintpy.troposphericDelay.weatherModel = ERA5
mintpy.deramp                   = linear

# Enmascarar baja coherencia en la velocidad final.
mintpy.network.coherenceBased   = yes
mintpy.network.minCoherence     = 0.4
